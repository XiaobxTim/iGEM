software:
  species: Homo sapiens
  genome_build: GRCh38
  gencode_release: 50
paths:
  cache_dir: .pufscan_cache
  output_dir: results
search:
  max_mismatches: 2
  search_reverse_complement: false
  batch_size: 50000
annotation:
  splice_proximity_nt: 20
structure:
  enabled: true
  flank_nt: 100
  window_size: 150
  max_base_pair_span: 100
  unpaired_length: 12
  temperature_c: 37.0
  top_n: 5000
risk_weights:
  sequence: 0.50
  accessibility: 0.20
  expression: 0.20
  consequence: 0.10
binding_only_consequence:
  splice_junction_spanning: 1.00
  splice_proximal: 0.90
  CDS: 0.80
  5UTR: 0.65
  3UTR: 0.60
  exonic_non_coding: 0.50
  other: 0.30
editing_consequence:
  stop_gained: 1.00
  stop_lost: 0.95
  start_lost: 0.95
  missense: 0.85
  splice_proximal: 0.85
  synonymous: 0.35
  UTR_edit: 0.55
  ncRNA_edit: 0.50
  unknown: 0.40
report:
  top_hits: 100
  heatmap_genes: 20


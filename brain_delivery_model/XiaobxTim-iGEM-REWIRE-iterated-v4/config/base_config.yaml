route: footpad

simulation:
  default_t_end: 48.0
  default_dt: 0.1
  solver: LSODA

absorption:
  footpad:
    k_lymph: 0.08
    k_blood: 0.03
    k_deg_loc: 0.005
    k_lymph_to_blood: 0.12

distribution:
  k_blood_to_liver: 0.08
  k_blood_to_peripheral: 0.05
  k_blood_to_brain: 0.01

  k_liver_to_blood: 0.01
  k_peripheral_to_blood: 0.02
  k_brain_to_blood: 0.0

  k_clear_blood: 0.01
  k_clear_liver: 0.02
  k_clear_peripheral: 0.01
  k_clear_brainblood: 0.001

bbb:
  k_brainblood_to_EC: 0.02
  k_EC_to_endo: 0.05
  k_EC_to_brainblood: 0.01

  k_endo_to_ISF: 0.01
  k_endo_to_brainblood: 0.005
  k_endo_loss: 0.01

  k_clear_ISF: 0.001

intracellular:
  k_ISF_to_cell: 0.03
  k_cell_to_nuc: 0.02
  k_cell_loss: 0.005

  k_deg_v: 0.003
  k_tx: 0.4
  k_deg_m: 0.08
  k_tl: 0.9
  k_deg_p: 0.03

editing:
  # Module 5 can be switched between:
  #   competitive              : original simplified competition model
  #   mechanistic_puf_apobec   : explicit E + S <-> ES -> E + P model
  #   apoe_multisite           : v4 APOE112/APOE158-aware model
  model: apoe_multisite

  # v4 explicitly records the deaminase identity. This prevents mixing
  # APOBEC3A, APOBEC1, engineered A3A, and ProAPOBEC assumptions.
  editor_type: A3A

  # Original competitive-editing parameters are kept so the old model can
  # still run by setting model: competitive.
  k_cat_on: 0.5
  K_d_on: 0.2
  k_cat_off: 0.05
  K_d_off: 1.0

  # Mechanistic PUF-APOBEC parameters.
  # P_brain from module 4 is treated as free active editor E.
  # On-target branch: E + APOE4 RNA <-> ES_on -> E + edited APOE2-like RNA.
  k_on_on: 1.0
  k_off_on: 0.5
  # Off-target branch uses weaker/slower binding and catalysis by default.
  k_on_off: 0.2
  k_off_off: 1.0

  # RNA turnover terms. These keep substrate pools biologically replenished;
  # with no editor, S_on and S_off tend to k_prod / k_deg.
  k_prod_on: 0.1
  k_deg_on: 0.1
  k_prod_off: 0.5
  k_deg_off: 0.1

  k_loss_on: 0.0
  k_loss_off: 0.0

  S_on_init: 1.0
  S_off_init: 5.0
  specificity_eps: 1.0e-12

  # v4 APOE biology: APOE4 is Arg112/Arg158; editing 112 only gives
  # APOE3-like, while editing both 112 and 158 gives APOE2-like.
  S_APOE4_init: 1.0
  S_puf_off_init: 1.5
  S_deaminase_bg_init: 4.0

  k_on_112: 1.0
  k_off_112: 0.5
  # gkac713 reports CU-REWIRE C-to-U editing in HEK293T at 48 h, with strong
  # activity when the edited C is in the preferred window/context. These are
  # normalized effective priors, not literal per-second biochemical constants.
  k_cat_112: 1.0
  k_on_158: 0.35
  k_off_158: 0.7
  k_cat_158: 0.15

  k_prod_apoe: 0.1
  k_deg_apoe: 0.1

  local_bystander_per_112: 0.04
  local_bystander_per_158: 0.06

  # 10-repeat PUF designs are used as the default v4 prior because gkac713
  # reports substantially improved transcriptome specificity versus shorter
  # recognition designs.
  k_on_puf_off: 0.015
  k_off_puf_off: 1.0
  k_cat_puf_off: 0.006

  # Background editing remains nonzero for active A3A-family constructs but is
  # separated from PUF-mediated off-target editing and set to zero for inactive
  # controls through editor_activity_scale in the design table.
  k_deaminase_bg: 0.0003
  k_prod_puf_off: 0.15
  k_deg_puf_off: 0.1
  k_prod_deaminase_bg: 0.4
  k_deg_deaminase_bg: 0.1

  uc_context_scale: 1.0
  a3a_background_scale: 0.8
  apobec1_cat_scale: 0.7
  apobec1_background_scale: 0.4
  proapobec_cat_scale: 1.25
  proapobec_background_scale: 0.5

optimization:
  E_on_target_threshold: 0.2
  E_off_max: 0.05
  SI_min: 5.0
  AUC_liver_max: 5.0
  Cmax_blood_max: 1.0

  dose_scan:
    dose_min: 0.1
    dose_max: 10.0
    n_doses: 12
